version: 2

updates:
  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "/vault/"
    open-pull-requests-limit: 100
    schedule:
      interval: "monthly"
    labels:
      - automerge
      - dependencies
  - package-ecosystem: "docker"
    directory: "/"
    open-pull-requests-limit: 100
    schedule:
      interval: "monthly"
    labels:
      - automerge
      - dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 100
    schedule:
      interval: "monthly"
    labels:
      - automerge
      - dependencies
