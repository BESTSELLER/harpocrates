name: goreleaser

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Getting secrets
        id: secrets
        uses: hashicorp/vault-action@4c06c5ccf5c0761b6029f56cfb1dcf5565918a3b # v3.4.0
        with:
          method: jwt
          url: ${{ vars.VAULT_ADDR }}
          path: ${{ vars.VAULT_AUTH_PATH }}
          role: ${{ vars.VAULT_ROLE }}
          exportToken: true
          secrets: |
            SHARED/data/common artifact_registry_url | ARTIFACT_REGISTRY_URL ;
            SHARED/data/common artifact_registry_project | ARTIFACT_REGISTRY_PROJECT ;
            PLATFORM/data/harpocrates/prod GITHUB_APP_ID | GITHUB_APP_ID ;
            PLATFORM/data/harpocrates/prod GITHUB_APP_PRIVATE_KEY | GITHUB_APP_PRIVATE_KEY ;
            PLATFORM/data/harpocrates/prod MACOS_SIGN_P12 | MACOS_SIGN_P12 ;
            PLATFORM/data/harpocrates/prod MACOS_SIGN_PASSWORD | MACOS_SIGN_PASSWORD ;
            PLATFORM/data/harpocrates/prod MACOS_NOTARY_ISSUER_ID | MACOS_NOTARY_ISSUER_ID ;
            PLATFORM/data/harpocrates/prod MACOS_NOTARY_KEY_ID | MACOS_NOTARY_KEY_ID ;
            PLATFORM/data/harpocrates/prod MACOS_NOTARY_KEY | MACOS_NOTARY_KEY ;

      - name: Generate a token
        id: generate_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ steps.secrets.outputs.GITHUB_APP_ID }}
          private-key: ${{ steps.secrets.outputs.GITHUB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "harpocrates,homebrew-tap,winget-pkgs"

      - id: "auth"
        name: Auth GCloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_POOL_PROVIDER_NAME }}
          service_account: ${{ vars.WORKLOAD_IDENTITY_SA_EMAIL }}

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"

      - name: "Configure docker"
        run: "gcloud auth configure-docker ${{ steps.secrets.outputs.ARTIFACT_REGISTRY_URL }}"

      - id: buildx
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7.0.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # A GitHub App token is used here because pushing to other repositories
          # (like BESTSELLER/homebrew-tap and BESTSELLER/winget-pkgs) requires cross-repo write access.
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          IMAGE_NAME: "${{ steps.secrets.outputs.ARTIFACT_REGISTRY_URL }}/${{ steps.secrets.outputs.ARTIFACT_REGISTRY_PROJECT }}/public-docker/${{ github.event.repository.name }}"
