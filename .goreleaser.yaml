version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: harpocrates
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    flags:
      - -trimpath
    ldflags:
      - >-
        -s -w
        -X github.com/BESTSELLER/harpocrates/cmd.version={{.Version}}
        -X github.com/BESTSELLER/harpocrates/cmd.commit={{.Commit}}
        -X github.com/BESTSELLER/harpocrates/cmd.date={{.Date}}
  - id: harpocrates-windows
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    flags:
      - -trimpath
    ldflags:
      - >-
        -s -w
        -X github.com/BESTSELLER/harpocrates/cmd.version={{.Version}}
        -X github.com/BESTSELLER/harpocrates/cmd.commit={{.Commit}}
        -X github.com/BESTSELLER/harpocrates/cmd.date={{.Date}}

archives:
  - # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats:
          - zip

dockers_v2:
  - images:
      - '{{ if index .Env "IMAGE_NAME" }}{{ .Env.IMAGE_NAME }}{{ else }}{{ .ProjectName }}{{ end }}'
    tags:
      - "{{ .Version }}"
      - "{{ .Major }}"
      - "{{ .Major }}.{{ .Minor }}"
      - "{{ if not .IsNightly }}latest{{ end }}"
    labels:
      "org.opencontainers.image.description": "Harpocrates is a lightweight, versatile CLI tool designed to securely fetch, format, and inject secrets from HashiCorp Vault"
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"

homebrew_casks:
  - name: harpocrates
    repository:
      owner: BESTSELLER
      name: homebrew-tap
    description: "Harpocrates is a lightweight, versatile CLI tool designed to securely fetch, format, and inject secrets from HashiCorp Vault"
    generate_completions_from_executable:
      args:
        - completion
      shell_parameter_format: cobra
      shells:
        - bash
        - zsh
        - fish
        - pwsh

winget:
  - name: harpocrates
    publisher: BESTSELLER
    license: "MIT"
    short_description: "Harpocrates is a lightweight, versatile CLI tool designed to securely fetch, format, and inject secrets from HashiCorp Vault"
    publisher_support_url: "https://github.com/BESTSELLER/harpocrates/issues"
    package_identifier: "bestseller.harpocrates"
    repository:
      owner: BESTSELLER
      name: winget-pkgs
      branch: "{{ .ProjectName }}-{{.Version}}"
      pull_request:
        enabled: false
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

release:
  draft: true
  replace_existing_artifacts: true

changelog:
  disable: true

notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      sign:
        certificate: "{{.Env.MACOS_SIGN_P12}}"
        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
      notarize:
        issuer_id: "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
        key_id: "{{.Env.MACOS_NOTARY_KEY_ID}}"
        key: "{{.Env.MACOS_NOTARY_KEY}}"
        wait: true
        timeout: 20m

binary_signs:
  - id: windows
    artifacts: binary
    ids:
      - harpocrates-windows
    cmd: jsign
    args:
      - "--storetype=GOOGLECLOUD"
      - "--keystore={{ .Env.WINDOWS_SIGN_KEYSTORE }}"
      - "--alias={{ .Env.WINDOWS_SIGN_ALIAS }}"
      - "--storepass={{ .Env.GCP_ACCESS_TOKEN }}"
      - "--certfile={{ .Env.WINDOWS_CERT_PATH }}"
      - "--tsaurl=http://timestamp.digicert.com"
      - "--tsmode=RFC3161"
      - "${artifact}"
